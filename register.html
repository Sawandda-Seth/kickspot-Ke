<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<body class="bg-gray-200 flex items-center justify-center min-h-screen p-6 bg-cover bg-center" style="background-image: url(assets/images/Background\ image\ 2.jpg);">
    <div class="absolute inset-0 bg-black/60"></div>
    <!-- Registration Card-->
     <div class="bg-white/10 backdrop-blur-xl border border-white/20 z-10 shadow-2xl rounded-3xl w-full max-w-lg p-8">
        <!--Heading-->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-700" style="color: var(--text-color);">
                 Create Account
            </h1>

            <p class="text-gray-600 mt-2">
                Fill in the details below
            </p>
        </div>

        <!-- Registration form -->
         <form class="space-y-5">
            <div class="mb-5">
                <label for="fullname" class="block text-gray-700 font-semibold mb-2">
                    Full Name
                </label>
                 <input type="text" id="fullname" placeholder="Enter your Full Name" class="w-full px-4 py-3 border rounded-xl bg-white/20 text-white placeholder-gray-200 
                 border border-white/30 focus:outline-none transition duration-300" required/>
            </div>
            <!-- Email Address-->
            <div class="mb-5">
                <label for="email" class="block mb-2 font-semibold">
                    Email Address
                </label>
                <input type="email" id="email" placeholder="Enter your email" class="w-full px-4 py-3 border border-white/30 rounded-xl focus:outline-none transition duration-300" required />
            </div>
            <!-- Password -->
             <div class="mb-5">
                <label for="password" class="block text-white mb-2 font-semibold" >
                    Password
                </label>
                <input type="password" id="password" placeholder="Create a password" 
                class="w-full px-4 py-3 border border-white/30 text-white rounded-lg focus:outline-none transition duration-300"  required />
             </div>
             <div class="mb-6">
                <label for="confirmPassword" class="block mb-2 font-semibold">
                    Confirm Password
                </label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" 
                class="w-full px-4 py-3 border border-white/30 rounded-xl focus:outline-none transition duration-300"
                 required />
             </div>
             <!-- Terms and Conditions-->
              <div class="flex items-center mb-6">
                <input type="checkbox" id="terms" class="mr-2" required />
                <label for="items" class="text-sm text-gray-600"> I agree to the Terms & Conditions</label>
              </div>
              <button type="submit" class="w-full text-white py-3 rounded-lg font-semibold transition duration-200">
              </button>
         </form>
     </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicksport-Ke</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
    <body class="bg-gray-200 flex items-center justify-center min-h-screen bg-cover bg-center" style="background-image: url(assets/images/Background\ image.jpg);">
    <!-- Login Container -->
     <section class="Login-section">
        <div class="Bg-white p-6 shadow-xl w-full">
        <div class="text-center mb-6">
        <h1 class="Text-3xl font-bold text-stone-800">Welcome Back</h1>
        <p class="text-stone-500 mt-4">
            Login to you Account
        </p>
        </div>

        <!--Login Form-->
        <form>
            <!--Email Address-->
            <div class="mb-5 ">
                <label type="submit" class="text-gray-700 font-medium mb-2 flex justify-center">
                    Email Address
                </label>
                <input type="email" id="email" placeholder="Enter you Email"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg" required/>
            <!--Password-->
            <div class="mb-5">
                <label for="password" class="Block text-white font-medium flex mb-2 justify-center">
                    Password
                </label>
                <input type="password" id="password" placeholder="Enter your password" 
                class="w-full px-4 py-5 border border-stone-700 rounded-lg focus:outline-none" required/>
            </div>
            <!-- Login Button-->
             <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white 
             font-semibold py-3 transition duration-200">
             Login
             </button>
             <!-- Register Link-->
              <p class="bg-amber-800 text-center text-gray-200 text-sm mt-4 rounded-lg">
                Don't have an account?
                <a href="register.html" class="text-blue-300 hover-underline font-medium">
                    Sign up
                </a>
              </p>
        </form>
     </section>
</body>
</html>
